endpoints:
  # Infra Group
  - name: internet
    group: Infra
    url: "icmp://8.8.8.8"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: dns-ui
    group: Infra
    url: "https://pihole.labz.tr/admin/login"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 300"
  - name: dns-tcp
    group: Infra
    url: "tcp://192.168.1.102:53"
    interval: 5m
    conditions:
      - "[CONNECTED] == true"
  - name: vpn-udp
    group: Infra
    url: "udp://192.168.1.104:14524"
    interval: 5m
    conditions:
      - "[CONNECTED] == true"

  # Servers Group
  - name: app-p01.labz.tr
    group: Servers
    url: "icmp://192.168.1.101"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: mon-p01.labz.tr
    group: Servers
    url: "icmp://192.168.2.4"
    interval: 15m
    conditions:
      - "[CONNECTED] == true"
  - name: dns-p01.labz.tr
    group: Servers
    url: "icmp://192.168.1.102"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: iot-p01.labz.tr
    group: Servers
    url: "icmp://192.168.1.103"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: vpn-p01.labz.tr
    group: Servers
    url: "icmp://192.168.1.104"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: ops-p01.labz.tr
    group: Servers
    url: "icmp://192.168.1.105"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
#  - name: ops-p02.labz.tr
#    group: Servers
#    url: "icmp://192.168.1.110"
#    interval: 1m
#    conditions:
#      - "[CONNECTED] == true"

  # Apps Group
  - name: portainer
    group: Apps
    url: "https://portainer.labz.tr"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 300"
  - name: traefik
    group: Apps
    url: "https://traefik.labz.tr/dashboard"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 300"
  - name: n8n
    group: Apps
    url: "https://n8n.labz.tr"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 300"
  - name: fayn-api
    group: Apps
    url: "https://api.fayn.tr"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
  - name: upti-api
    group: Apps
    url: "https://backend.upti.tr"
    interval: 15m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
      - "[BODY].status == healthy"
      - "[BODY].backend.d1_database.status == healthy"
  - name: certwarden-api
    group: Apps
    url: "https://certwarden.perim.net"
    interval: 15m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
      - "[BODY].status == healthy"
  - name: suitsnap-api
    group: Apps
    url: "https://suitsnap.perim.net"
    interval: 15m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
      - "[BODY].status == ok"
  - name: besidefteri-api
    group: Apps
    url: "https://api.besidefteri.com/health"
    interval: 15m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
      - "[BODY].status == ok"

  # Certificate Group
  - name: dash.labz.tr
    group: Certificate
    url: "tls://dash.labz.tr:443"
    interval: 24h
    conditions:
      - "[CONNECTED] == true"
      - "[CERTIFICATE_EXPIRATION] > 72h"
  - name: traefik.labz.tr
    group: Certificate
    url: "tls://traefik.labz.tr:443"
    interval: 24h
    conditions:
      - "[CONNECTED] == true"
      - "[CERTIFICATE_EXPIRATION] > 72h"
  - name: vpn.labz.tr
    group: Certificate
    url: "tls://vpn.labz.tr:443"
    interval: 24h
    conditions:
      - "[CONNECTED] == true"
      - "[CERTIFICATE_EXPIRATION] > 72h"
  - name: srv01.labz.tr
    group: Certificate
    url: "tls://srv01.labz.tr:8006"
    interval: 24h
    conditions:
      - "[CONNECTED] == true"
      - "[CERTIFICATE_EXPIRATION] > 72h"


  # IoT Group
  - name: homeassistant
    group: IoT
    url: "https://ha.labz.tr"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 300"
  - name: krm-garage-door-device
    group: IoT
    url: "https://krm-garage-door-monitor.ismailperim.workers.dev"
    interval: 15m
    conditions:
      - "[STATUS] == 200"
  - name: heater-device
    group: IoT
    url: "https://n8n.labz.tr/webhook/heater/monitor"
    interval: 5m
    conditions:
      - "[STATUS] == 200"


  # HouseKeeping
  - name: pihole-update
    group: HouseKeeping
    url: "https://n8n.labz.tr/webhook/222e5936-435a-4f5f-92f1-f300f749bc54"
    interval: 30m
    conditions:
      - "[STATUS] == 200"
  - name: supabase-backup
    group: HouseKeeping
    url: "https://n8n.labz.tr/webhook/supabase-backup"
    interval: 30m
    conditions:
      - "[STATUS] == 200"
      - "[BODY].daily > 0"
      - "[BODY].hourly > 0"



